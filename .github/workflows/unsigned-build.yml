name: Unsigned iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve project and build unsigned
        shell: bash
        run: |
          set -euo pipefail

          workspace="$(find . -maxdepth 2 -name '*.xcworkspace' | head -n1 || true)"
          project="$(find . -maxdepth 2 -name '*.xcodeproj' | head -n1 || true)"

          if [[ -n "$workspace" ]]; then
            container_flag=(-workspace "$workspace")
          elif [[ -n "$project" ]]; then
            container_flag=(-project "$project")
          else
            echo "No .xcworkspace or .xcodeproj found in repository."
            exit 1
          fi

          scheme="$(xcodebuild "${container_flag[@]}" -list | awk '/Schemes:/{flag=1; next} flag && NF {print; exit}' | xargs || true)"

          if [[ -z "$scheme" ]]; then
            echo "No Xcode scheme found."
            exit 1
          fi

          echo "Using scheme: $scheme"

          xcodebuild \
            "${container_flag[@]}" \
            -scheme "$scheme" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-derived-data
          path: build/DerivedData
          if-no-files-found: ignore
